
<!DOCTYPE html >
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="flex justify-center items-center min-h-screen bg-gradient-to-br from-purple-900 via-indigo-800 to-blue-900 p-4">
    <!-- Login Form Section -->
    <section class="w-full max-w-md">
      <div class="rounded-none bg-white p-8 shadow-sm">
        <!-- Header -->
        <div class="mb-8 text-center">
         
          <div
            class="text-center bg-gradient-to-l from-gray-200 via-fuchsia-200 to-stone-100 rounded-2xl mb-8 py-3 w-44 mx-auto"
          >
            <img
              src="{% static 'account/css/images/NS.png' %}"
              class="w-44 mx-auto"
            />
          </div>

          <h1 class="mb-2 text-2xl font-bold text-blue-800">Welcome Back</h1>
          <p class="text-sm text-blue-400">
            Sign in to your account to continue
          </p>
          {% if error %}
          <div class="bg-red-100 text-red-700 p-3 mb-4">{{ error }}</div>
          {% endif %}
        </div>

        <!-- Form -->
        <form class="space-y-6" method="POST" action="{% url 'login' %}">
          {% csrf_token %}

          <!-- REMOVE the user_role field or keep it but make sure it's not causing issues -->

          <div>
            <label
              for="username"
              class="mb-2 block text-sm font-medium text-black-700"
            >
              Username or Email
            </label>
            <input
              type="text"
              id="username"
              name="username"
              class="w-full border border-gray-300 bg-white px-4 py-3 text-gray-900 focus:border-transparent focus:ring-2 focus:ring-black focus:outline-none"
              placeholder="Enter username or email"
              required
            />
          </div>

          <div>
            <div class="mb-2 flex items-center justify-between">
              <label
                for="password"
                class="block text-sm font-medium text-black-700"
              >
                Password
              </label>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              class="w-full border border-gray-300 bg-white px-4 py-3 text-gray-900 focus:border-transparent focus:ring-2 focus:ring-black focus:outline-none"
              placeholder="Enter your password"
              required
            />
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 px-6 py-3 text-sm font-medium text-white transition-colors hover:bg-blue-700"
          >
            Log In
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
