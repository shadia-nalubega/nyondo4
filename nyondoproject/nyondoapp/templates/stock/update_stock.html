<!DOCTYPE html>
<html>
<head>
    <title>Update Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-blue-700 mb-6">Update Stock Item</h1>
        
        <!-- Form to update the stock -->
        <form method="POST">
            {% csrf_token %}  
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Product ID</label>
                    <input type="text" name="product_id" value="{{ item.product_id }}" 
                           class="w-full border rounded-lg px-3 py-2">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Description</label>
                    <textarea name="description" rows="3" 
                              class="w-full border rounded-lg px-3 py-2">{{ item.description }}</textarea>
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Quantity</label>
                    <input type="number" name="quantity" value="{{ item.quantity }}" 
                           class="w-full border rounded-lg px-3 py-2">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Unit Price</label>
                    <input type="number" step="0.01" name="unit_price" value="{{ item.unit_price }}" 
                           class="w-full border rounded-lg px-3 py-2">
                </div>
                
                <!-- <div>
                    <select name="supplier" class="w-full border rounded-lg px-3 py-2">
    {% for supplier in suppliers %}
        <option value="{{ supplier.id }}"
            {% if supplier.id == item.supplier.id %}selected{% endif %}>
            {{ supplier.name }}
        </option>
    {% endfor %}
</select>
                </div> -->
                
                <!-- <div>
                    <label class="block text-gray-700 font-bold mb-2">Buyer Type</label>
                    <select name="buyer_type" class="w-full border rounded-lg px-3 py-2">
                        <option value="Retail" {% if item.buyer_type == 'Retail' %}selected{% endif %}>Retail</option>
                        <option value="Wholesale" {% if item.buyer_type == 'Wholesale' %}selected{% endif %}>Wholesale</option>
                    </select>
                </div> -->
            </div>
            
            <!-- Buttons -->
            <div class="flex gap-3 mt-6">
                <button type="submit" 
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    Save Changes
                </button>
                
                <a href="{% url 'stock_page' %}" 
                   class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
