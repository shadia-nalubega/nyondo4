<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set Product Prices</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f0f2f5;
      }

      .price-card {
        max-width: 850px;
        width: 100%;
        background: white;
        border-radius: 12px;
      }

      .header-title {
        color: #0d6efd;
        font-weight: bold;
      }

      .price-box {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <form
        method="POST"
        action="{% url 'save_pricing' %}"
        class="price-card shadow-lg p-4"
      >
        {% csrf_token %}

        <!-- HEADER -->
        <div class="text-center mb-4">
          <h2 class="header-title">NyondoStock Hardware</h2>
          <h3 class="text-secondary">Set Product Prices</h3>
          <hr />
        </div>

        <!-- PRODUCT DETAILS -->
        <div class="price-box mb-4">

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Product Name</label>

              <input
                type="text"
                class="form-control"
                value="{{ request.session.temp_product_name }}"
                readonly
              />
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">Cost Price (UGX)</label>

              <input
                type="number"
                id="cost_price"
                class="form-control"
                value="{{ request.session.temp_cost_price }}"
                readonly
              />
            </div>
          </div>
        </div>

        <!-- HIDDEN FIELDS -->
        <input
          type="hidden"
          name="product_name"
          value="{{ request.session.temp_product_name }}"
        />

        <input
          type="hidden"
          name="cost_price"
          value="{{ request.session.temp_cost_price }}"
        />

        <!-- PRICE SECTION -->
        <h4 class="text-primary border-bottom pb-2 mb-4">
          Selling Prices
        </h4>

        <!-- WHOLESALER -->
        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label fw-bold">
              Wholesaler Rate (%)
            </label>

            <input
              type="number"
              name="wholesaler_rate"
              id="wholesaler_rate"
              class="form-control"
              onkeyup="calculatePrice('wholesaler')"
            />
          </div>

          <div class="col-md-4">
            <label class="form-label fw-bold">
              Wholesaler Price
            </label>

            <input
              type="text"
              name="wholesaler_price"
              id="wholesaler_price"
              class="form-control"
              readonly
            />
          </div>
        </div>

        <!-- RETAILER -->
        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label fw-bold">
              Retailer Rate (%)
            </label>

            <input
              type="number"
              name="retailer_rate"
              id="retailer_rate"
              class="form-control"
              onkeyup="calculatePrice('retailer')"
            />
          </div>

          <div class="col-md-4">
            <label class="form-label fw-bold">
              Retailer Price
            </label>

            <input
              type="text"
              name="retailer_price"
              id="retailer_price"
              class="form-control"
              readonly
            />
          </div>
        </div>

        <!-- NORMAL BUYER -->
        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label fw-bold">
              Normal Buyer Rate (%)
            </label>

            <input
              type="number"
              name="normal_rate"
              id="normal_rate"
              class="form-control"
              onkeyup="calculatePrice('normal')"
            />
          </div>

          <div class="col-md-4">
            <label class="form-label fw-bold">
              Normal Buyer Price
            </label>

            <input
              type="text"
              name="normal_price"
              id="normal_price"
              class="form-control"
              readonly
            />
          </div>
        </div>

        <!-- BUTTONS -->
        <div
          class="d-flex justify-content-center gap-3 mt-4 pt-3 border-top"
        >
          <button type="submit" class="btn btn-primary px-4 py-2">
            Save Prices
          </button>

          <a
            href="{% url 'stock_reg' %}"
            class="btn btn-secondary px-4 py-2"
          >
            Back
          </a>
        </div>

        <p class="text-center mt-4 text-muted small">
          &copy; NyondoStock Hardware 2026
        </p>
      </form>
    </div>

    <script>
      function calculatePrice(type) {

        let costPrice = parseFloat(
          document.getElementById("cost_price").value
        );

        let rate = parseFloat(
          document.getElementById(type + "_rate").value
        );

        if (!rate || !costPrice) {
          return;
        }

        let finalPrice =
          costPrice + (costPrice * rate / 100);

        document.getElementById(type + "_price").value =
          Math.round(finalPrice);
      }
      document.querySelector('form').addEventListener('submit', function(e) {
    let costPrice = parseFloat(document.getElementById('cost_price').value);
    if (costPrice <= 0) {
        alert('Cost price must be greater than zero. Please go back and enter a valid cost price.');
        e.preventDefault();
    }
});
    </script>
  </body>
</html>
