<!DOCTYPE html>
<html>
<head>
    <title>View Stock Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-purple-900 mb-6">Stock Details</h1>
        
        <!-- Show all the item details -->
        <div class="space-y-3">
            <div class="border-b pb-2">
                <strong class="text-gray-700">Product ID:</strong>
                <span class="ml-2">{{ item.product_id }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Description:</strong>
                <span class="ml-2">{{ item.description }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Quantity:</strong>
                <span class="ml-2">{{ item.quantity }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Unit Price:</strong>
                <span class="ml-2">UGX {{ item.unit_price }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Supplier:</strong>
                <span class="ml-2">{{ item.supplier }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Buyer Type:</strong>
                <span class="ml-2">{{ item.buyer_type }}</span>
            </div>
            
            <div class="border-b pb-2">
                <strong class="text-gray-700">Date Added:</strong>
                <span class="ml-2">{{ item.date }}</span>
            </div>
        </div>
        
        <!-- Back button -->
        <div class="mt-6">
            <a href="{% url 'stock_page' %}" 
               class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700">
                Back to Stock List
            </a>
        </div>
    </div>
</body>
</html>
