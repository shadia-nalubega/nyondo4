<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-4">Edit Customer</h4>

          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-bold">Customer Name</label>
              <input type="text" name="customer_name" class="form-control"
                     value="{{ customer.customer_name }}" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Phone</label>
              <input type="text" name="phone" class="form-control"
                     value="{{ customer.phone }}" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Product Name</label>
              <select name="product_name" class="form-select">
                <option value="cement"      {% if customer.product_name == 'cement' %}selected{% endif %}>Cement</option>
                <option value="iron sheets" {% if customer.product_name == 'iron sheets' %}selected{% endif %}>Iron Sheets</option>
                <option value="iron bars"   {% if customer.product_name == 'iron bars' %}selected{% endif %}>Iron Bars</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">NIN</label>
              <input type="text" name="nin" class="form-control"
                     value="{{ customer.nin }}" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Location</label>
              <input type="text" name="location" class="form-control"
                     value="{{ customer.location }}" required />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Total Price (UGX)</label>
              <input type="number" name="total_price" class="form-control"
                     value="{{ customer.total_price }}" required />
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-success px-4">Save Changes</button>
              <a href="{% url 'customer_page' %}" class="btn btn-secondary px-4">Cancel</a>
            </div>
          </form>

        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
