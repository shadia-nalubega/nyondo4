{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Update Employee</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body{
        font-family: "Plus Jakarta Sans", sans-serif;
        background:#f8fafc;
      }

      .input{
        width:100%;
        padding:14px;
        border:1px solid #cbd5e1;
        border-radius:16px;
        outline:none;
      }

      .input:focus{
        border-color:#0d6efd;
      }
    </style>
  </head>

  <body class="text-slate-800">

    <!-- NAVBAR -->
    <nav class="bg-[#0d6efd] px-6 py-4 shadow-md">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white">
          NYONDOSTOCK
        </h1>

        <a
          href="{% url 'employee_table' %}"
          class="bg-white text-[#0d6efd] px-4 py-2 rounded-xl font-semibold"
        >
          Back
        </a>
      </div>
    </nav>

    <!-- FORM -->
    <main class="p-6 lg:p-8">

      <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 max-w-3xl mx-auto">

        <h2 class="text-3xl font-bold mb-8">
          Update Employee
        </h2>

        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <div>
            <label class="block mb-2 font-medium">
              Full Name
            </label>

            <input
              type="text"
              name="name"
              value="{{ staff.name }}"
              class="input"
            />
          </div>

          <div>
            <label class="block mb-2 font-medium">
              Email
            </label>

            <input
              type="email"
              name="email"
              value="{{ staff.email }}"
              class="input"
            />
          </div>

          <div>
            <label class="block mb-2 font-medium">
              Employee ID
            </label>

            <input
              type="text"
              name="employee_id"
              value="{{ staff.employee_id }}"
              class="input"
            />
          </div>

          <div>
            <label class="block mb-2 font-medium">
              Role
            </label>

            <select name="role" class="input">

              <option value="admin"
                {% if staff.role == "admin" %}selected{% endif %}
              >
                Admin
              </option>

              <option value="sales_attendant"
                {% if staff.role == "sales_attendant" %}selected{% endif %}
              >
                Sales Attendant
              </option>

              <option value="store_manager"
                {% if staff.role == "store_manager" %}selected{% endif %}
              >
                Store Manager
              </option>

            </select>
          </div>

          <div>
            <label class="block mb-2 font-medium">
              Password
            </label>

            <input
              type="text"
              name="password"
              value="{{ staff.password }}"
              class="input"
            />
          </div>

          <button
            type="submit"
            class="bg-[#0d6efd] hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-semibold"
          >
            Update Employee
          </button>

        </form>

      </div>

    </main>

  </body>
</html>
