<!-- templates/account/update_supplier.html -->

<!doctype html>
<html lang="en">
  <head>
    {% load static %}

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Update Supplier</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8fafc;
      }

      .parent-container {
        width: 100%;
        max-width: 850px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      section.content {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .customer {
        display: flex;
        gap: 20px;
      }

      @media (max-width: 768px) {
        .customer {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <section class="content">
      <form
        method="POST"
        action="{% url 'update_supplier' supplier.id %}"
      >
        {% csrf_token %}

        <div class="parent-container">
          <section class="header text-center">
            <h2 class="mt-4 mb-3 text-primary">
              NyondoStock
            </h2>

            <h3>Update Supplier</h3>
          </section>

          <hr />

          <h5 class="mt-4 mb-3 text-primary">
            COMPANY DETAILS
          </h5>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label class="form-label">
                Company Name
              </label>

              <input
                type="text"
                class="form-control"
                name="company_name"
                value="{{ supplier.company_name }}"
              />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">
                TRN
              </label>

              <input
                type="text"
                class="form-control"
                name="TRN"
                value="{{ supplier.TRN }}"
              />
            </div>
          </div>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label class="form-label">
                Location
              </label>

              <input
                type="text"
                class="form-control"
                name="location"
                value="{{ supplier.location }}"
              />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                name="email"
                value="{{ supplier.email }}"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">
              Product Description
            </label>

            <textarea
              class="form-control"
              name="product_description"
              rows="3"
            >{{ supplier.product_description }}</textarea>
          </div>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label class="form-label">
                Phone Number
              </label>

              <input
                type="tel"
                class="form-control"
                name="phone"
                value="{{ supplier.phone }}"
              />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">
                Payment Terms
              </label>

              <select
                class="form-select"
                name="payment_option"
              >
                <option value="cash">cash</option>

                <option value="bank-transfer">
                  bank-transfer
                </option>

                <option value="card-payment">
                  card-payment
                </option>

                <option value="cheque">
                  cheque
                </option>

                <option value="Credit Options">
                  Credit Options
                </option>

                <option value="All above">
                  All above
                </option>
              </select>
            </div>
          </div>

          <div class="d-flex justify-content-center gap-3 mt-4">
            <button
              type="submit"
              class="btn btn-primary px-4"
            >
              Update Supplier
            </button>

            <a
              href="{% url 'supplier_list' %}"
              class="btn btn-secondary px-4"
            >
              Cancel
            </a>
          </div>

          <p class="text-center mt-4">
            &copy; copyright NyondoStock 2026
          </p>
        </div>
      </form>
    </section>
  </body>
</html>
