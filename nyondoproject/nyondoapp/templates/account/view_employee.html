{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>View Employee</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body{
        font-family: "Plus Jakarta Sans", sans-serif;
        background:#f8fafc;
      }
    </style>
  </head>

  <body class="text-slate-800">

    <!-- NAVBAR -->
    <nav class="bg-[#0d6efd] px-6 py-4 shadow-md">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white">
          NYONDOSTOCK
        </h1>

        <a
          href="{% url 'employee_table' %}"
          class="bg-white text-[#0d6efd] px-4 py-2 rounded-xl font-semibold"
        >
          Back
        </a>
      </div>
    </nav>

    <!-- CONTENT -->
    <main class="p-6 lg:p-8">

      <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 max-w-3xl mx-auto">

        <h2 class="text-3xl font-bold mb-8 text-slate-800">
          Employee Details
        </h2>

        <div class="grid md:grid-cols-2 gap-6">

          <div>
            <p class="text-slate-500 mb-1">Full Name</p>
            <h3 class="font-semibold text-lg">
              {{ employee.user.first_name }}
            </h3>
          </div>

          <div>
            <p class="text-slate-500 mb-1">Employee ID</p>
            <h3 class="font-semibold text-lg">
              {{ employee.employee_id }}
            </h3>
          </div>

          <div>
            <p class="text-slate-500 mb-1">Email</p>
            <h3 class="font-semibold text-lg">
              {{ employee.user.email }}
            </h3>
          </div>

          <div>
            <p class="text-slate-500 mb-1">Role</p>
            <h3 class="font-semibold text-lg capitalize">
              {{ employee.role }}
            </h3>
          </div>

        </div>

      </div>

    </main>
 <a href="{% url 'dashboard_redirect' %}" class="btn btn-secondary">Back</a>
  </body>
</html>
