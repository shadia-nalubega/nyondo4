<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Supplier Credit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm mx-auto" style="max-width: 550px">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0 fw-bold">Supplier Credit Details</h5>
        </div>

        <div class="card-body p-4">
          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Company Name</div>
            <div class="col-7">{{ credit.company_name.company_name }}</div>
          </div>
          <hr class="my-2" />
          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Amount Owed</div>
            <div class="col-7 fw-bold text-danger">
              {{ credit.amount_owed }} UGX
            </div>
          </div>
          <hr class="my-2" />
          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Quantity</div>
            <div class="col-7">{{ credit.quantity }}</div>
          </div>
          <hr class="my-2" />
          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Status</div>
            <div class="col-7">
              <span
                class="badge {% if credit.status == 'Paid' %}bg-success {% elif credit.status == 'Pending' %}bg-warning text-dark {% else %}bg-secondary{% endif %}"
              >
                {{ credit.status }}
              </span>
            </div>
          </div>
          <hr class="my-2" />
          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Notes</div>
            <div class="col-7">{{ credit.notes }}</div>
          </div>
        </div>

        <div class="card-footer d-flex gap-2 justify-content-end">
          <a href="{% url 'supplier_credit_table' %}" class="btn btn-secondary"
            >Back</a
          >
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
