{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
  </head>
  <body class="bg-slate-100 text-slate-800 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 w-full max-w-lg">

      <div class="bg-gray-900 text-white px-6 py-4 rounded-t-3xl">
        <h2 class="text-xl font-bold">Edit Payment</h2>
      </div>

      <form method="POST" class="p-6 space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Supplier Name</label>
          <input type="text" name="supplier_name"
                 value="{{ payment.supplier_name }}"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Product Description</label>
          <input type="text" name="product_description"
                 value="{{ payment.product_description }}"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Amount Paid (UGX)</label>
          <input type="number" name="amount_paid"
                 value="{{ payment.amount_paid }}"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Balance Remaining (UGX)</label>
          <input type="number" name="balance_remaining"
                 value="{{ payment.balance_remaining }}"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Payment Date</label>
          <input type="date" name="payment_date"
                 value="{{ payment.payment_date }}"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                 required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Comments</label>
          <textarea name="comments" rows="3"
                    class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-400">{{ payment.comments }}</textarea>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-2xl font-semibold transition">
            Save Changes
          </button>
          <a href="{% url 'payment_table' %}"
             class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-2.5 rounded-2xl font-semibold transition">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </body>
</html>
