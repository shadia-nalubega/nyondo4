{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Delete Employee</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body{
        font-family: "Plus Jakarta Sans", sans-serif;
        background:#f8fafc;
      }
    </style>
  </head>

  <body class="text-slate-800 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 w-full max-w-lg">

      <h2 class="text-3xl font-bold text-red-500 mb-4">
        Delete Employee
      </h2>

      <p class="text-slate-600 mb-8">
        Are you sure you want to delete
        <strong>{{ staff.name }}</strong>?
      </p>

      <form method="POST">
        {% csrf_token %}

        <div class="flex gap-4">

          <button
            type="submit"
            class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl font-semibold"
          >
            Delete
          </button>

          <a
            href="{% url 'staff_list' %}"
            class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-2xl font-semibold"
          >
            Cancel
          </a>

        </div>

      </form>

    </div>

  </body>
</html>
