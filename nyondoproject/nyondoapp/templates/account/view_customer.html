<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0 fw-bold">Customer Details</h5>
        </div>

        <div class="card-body p-4">

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Customer Name</div>
            <div class="col-7">{{ customer.customer_name }}</div>
          </div>

          <hr class="my-2" />

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Phone</div>
            <div class="col-7">{{ customer.phone }}</div>
          </div>

          <hr class="my-2" />

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Product</div>
            <div class="col-7">{{ customer.product_name }}</div>
          </div>

          <hr class="my-2" />

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">NIN</div>
            <div class="col-7">{{ customer.nin }}</div>
          </div>

          <hr class="my-2" />

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Location</div>
            <div class="col-7">{{ customer.location }}</div>
          </div>

          <hr class="my-2" />

          <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Total Price</div>
            <div class="col-7 fw-bold text-success">{{ customer.total_price }} UGX</div>
          </div>

        </div>

        <div class="card-footer d-flex gap-2 justify-content-end">
          
          <a href="{% url 'customer_page' %}" class="btn btn-secondary">Back</a>
        </div>

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
