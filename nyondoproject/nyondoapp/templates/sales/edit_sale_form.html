{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sale - NyondoStock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background: #f8fafc;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div class="container mx-auto px-4 py-8 lg:py-12 max-w-4xl">
        <!-- Main form card -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            <!-- Edit form (POST to update) -->
            <form method="POST" action="{% url 'edit_sale' sale.id %}">
                {% csrf_token %}
                
                <!-- Header area -->
                <div class="px-6 pt-6 pb-4 border-b border-slate-200">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold text-indigo-700">NyondoStock Hardware</h2>
                            <h3 class="text-lg font-semibold text-slate-600 mt-1">Edit Sale Record</h3>
                        </div>
                        <!-- <a href="{% url 'sales_page' %}" class="text-slate-500 hover:text-indigo-600 transition text-sm font-medium">
                            ← Back to Sales
                        </a> -->
                    </div>
                    <hr class="mt-3 border-slate-200">
                </div>

                <div class="p-6 space-y-6">
                    <!-- Section 1: Product Information -->
                    <div>
                        <h4 class="text-md font-bold text-indigo-600 border-b border-slate-200 pb-2 mb-4 flex items-center gap-2">
                            
                            Product & Pricing
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Product Name <span class="text-red-500">*</span></label>
                                <input type="text" name="product_name" value="{{ sale.product_name|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Quantity <span class="text-red-500">*</span></label>
                                <input type="number" step="any" name="quantity" value="{{ sale.quantity|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Unit Price <span class="text-red-500">*</span></label>
                                <input type="number" step="any" name="selling_price" value="{{ sale.selling_price|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Total Amount </label>
                                <input type="text" value="{{ sale.total_amount|floatformat:0 }}" class="w-full bg-slate-100 border-slate-200 border rounded-lg px-4 py-2.5 text-slate-600" readonly disabled>
                                <p class="text-xs text-slate-400 mt-1">Auto-calculated when saved</p>
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Customer & Payment Details -->
                    <div>
                        <h4 class="text-md font-bold text-indigo-600 border-b border-slate-200 pb-2 mb-4 flex items-center gap-2">
                            <!-- < -->
                            Customer & Payment
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Customer Name</label>
                                <input type="text" name="customer_name" value="{{ sale.customer_name|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Payment Method</label>
                                <select name="payment" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500">
                                    <option value="">-- Select --</option>
                                    <option value="Cash" {% if sale.payment == "Cash" %}selected{% endif %}>Cash</option>
                                    <option value="Bank Transfer" {% if sale.payment == "Bank Transfer" %}selected{% endif %}>Bank Transfer</option>
                                    <option value="Cheque" {% if sale.payment == "Cheque" %}selected{% endif %}>Cheque</option>
                                    <option value="Credit" {% if sale.payment == "Credit" %}selected{% endif %}>Credit</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Section 3: Delivery Information -->
                    <div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Distance (km)</label>
                                <input type="number" step="any" name="distance" value="{{ sale.distance|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Transport Fee </label>
                                <input type="number" step="any" name="transport_fee" value="{{ sale.transport_fee|default:'' }}" class="w-full rounded-lg border-slate-300 border px-4 py-2.5 focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer with Delete (separate form) and Update/Cancel buttons -->
                <div class="px-6 py-5 bg-slate-50 border-t border-slate-200 flex flex-wrap justify-between items-center gap-3">
                    <!-- Delete button as a separate POST form (no JS) -->
                    <form method="POST" action="{% url 'delete_sale' sale.id %}">
                        {% csrf_token %}
                        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 px-5 rounded-lg transition shadow-sm flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                            Delete Sale
                        </button>
                    </form>
                    <div class="flex gap-3">
                        <a href="{% url 'sales_page' %}" class="border border-slate-300 text-slate-700 bg-white hover:bg-slate-50 font-semibold py-2.5 px-5 rounded-lg transition">Cancel</a>
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-lg transition shadow-sm flex items-center gap-2">
                        
                            Update Sale
                        </button>
                    </div>
                </div>

                <!-- Footer copyright -->
                <div class="text-center py-3 text-xs text-slate-400 border-t border-slate-100">
                    &copy; NyondoStock Hardware 2026. All rights reserved.
                </div>
            </form>
        </div>
    </div>
</body>
</html>
